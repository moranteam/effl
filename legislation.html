<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legislation Tracker · EFFL</title>
<meta name="description" content="Every motion brought before the EFFL Assembly, with full vote records, tallies, and rulings.">
<meta property="og:site_name" content="The Estate Fantasy Football League">
<meta property="og:title" content="Legislation Tracker · EFFL">
<meta property="og:description" content="The motions of the Assembly, from the abolition of unanimity to the Keeper Codex. Every vote on the record.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://moranteam.github.io/effl/legislation.html">
<meta property="og:image" content="https://moranteam.github.io/effl/assets/EFFL_Crest.png">
<meta name="twitter:card" content="summary">
<meta name="theme-color" content="#0B0E13">
<link rel="icon" type="image/png" href="assets/EFFL_Crest.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@600;700&family=Inter:wght@400;500;600;700&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<script src="data/league-data.js" defer></script>
<script src="data/site-config.js" defer></script>
<script src="js/app.js" defer></script>
<script src="js/render.js" defer></script>
</head>
<body data-page="legislation">
<div id="ticker" class="ticker" aria-hidden="true"></div>
<header id="site-nav" class="site-nav"></header>
<div id="commish-bar"></div>
<main>

  <section class="hero" data-hero="parchment">
    <div class="hero-inner">
      <div class="hero-kicker">The Assembly In Session</div>
      <h1 class="hero-title">Legislation Tracker</h1>
      <p class="hero-sub" id="leg-sub"></p>
    </div>
  </section>

  <section class="section">
    <div class="wrap">
      <div class="grid cols-4" id="leg-stats"></div>
      <div class="mt-3">
        <label class="label" for="leg-search" style="display:block;margin-bottom:8px">Search The Record</label>
        <input class="search-input" id="leg-search" type="search" placeholder="Search motions by number, title, or ruling...">
      </div>
      <div class="mt-3" id="motions"></div>
    </div>
  </section>

</main>
<footer id="site-footer"></footer>
<noscript><div style="padding:40px;text-align:center">The EFFL record renders from its data layer and requires JavaScript.</div></noscript>
</body>
</html>
