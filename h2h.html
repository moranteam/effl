<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Head to Head · EFFL</title>
<meta name="description" content="The EFFL head to head matrix: every all time rivalry record, including playoffs, with last meetings and biggest wins.">
<meta property="og:site_name" content="The Estate Fantasy Football League">
<meta property="og:title" content="Head to Head · EFFL">
<meta property="og:description" content="Every rivalry quantified. All time records including playoffs, since 2015.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://moranteam.github.io/effl/h2h.html">
<meta property="og:image" content="https://moranteam.github.io/effl/assets/EFFL_Crest.png">
<meta name="twitter:card" content="summary">
<meta name="theme-color" content="#0B0E13">
<link rel="icon" type="image/png" href="assets/EFFL_Crest.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@600;700&family=Inter:wght@400;500;600;700&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<script src="data/league-data.js" defer></script>
<script src="data/site-config.js" defer></script>
<script src="js/app.js" defer></script>
<script src="js/render.js" defer></script>
</head>
<body data-page="h2h">
<div id="ticker" class="ticker" aria-hidden="true"></div>
<header id="site-nav" class="site-nav"></header>
<div id="commish-bar"></div>
<main>

  <section class="hero" data-hero="war">
    <div class="hero-inner">
      <div class="hero-kicker">Know Thy Enemy</div>
      <h1 class="hero-title">Head To Head</h1>
      <p class="hero-sub" id="h2h-sub"></p>
    </div>
  </section>

  <section class="section">
    <div class="wrap">
      <div class="section-head" style="display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;justify-content:space-between">
        <div>
          <div class="eyebrow left">Rows Read Left To Right</div>
          <h2 class="section-title" style="font-size:clamp(2rem,5vw,3rem)">The Matrix</h2>
          <p class="section-sub">Cell color runs maroon (owned) to gold (owner). Tap any cell for the full rivalry file.</p>
        </div>
        <button class="btn-ghost" id="perkins-toggle" type="button"></button>
      </div>
      <div class="h2h-wrap panel" style="padding:14px" id="h2h-matrix"></div>
      <div class="h2h-detail" id="h2h-detail">
        <div class="empty-state"><b>Select A Rivalry</b>Tap any cell above to open the full file: all time record, last meeting, and the most lopsided result in the series.</div>
      </div>
    </div>
  </section>

</main>
<footer id="site-footer"></footer>
<noscript><div style="padding:40px;text-align:center">The EFFL record renders from its data layer and requires JavaScript.</div></noscript>
</body>
</html>
